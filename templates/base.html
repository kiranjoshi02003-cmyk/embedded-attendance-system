<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync - Attendance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --sidebar-width: 260px;
            --bg-light: #f8f9fa;
            --card-shadow: 0 4px 20px 0 rgba(0,0,0,0.05);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            overflow-x: hidden;
        }
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #1e293b;
            color: #fff;
            z-index: 1000;
            transition: all 0.3s;
        }
        #sidebar .nav-link {
            color: #cbd5e1;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 8px;
            margin: 4px 15px;
            text-decoration: none;
        }
        #sidebar .nav-link:hover, #sidebar .nav-link.active {
            background: #334155;
            color: #fff;
        }
        #main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            min-height: 100vh;
        }
        .stat-card {
            border: none;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary">
            <h4 class="m-0 fw-bold text-success"><i class="fa-solid fa-fingerprint me-2"></i>BioSync Pro</h4>
            <small class="text-muted">IoT Management System</small>
        </div>
        <div class="mt-4">
            <a href="/dashboard" class="nav-link active">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="/students" class="nav-link">
                <i class="fa-solid fa-users"></i> Students
            </a>
            <a href="/attendance" class="nav-link">
                <i class="fa-solid fa-calendar-check"></i> Attendance Records
            </a>
            <a href="/devices" class="nav-link">
                <i class="fa-solid fa-server"></i> Device Nodes
            </a>
            <hr class="mx-3 text-secondary">
            <a href="#" class="nav-link text-danger" onclick="handleLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </div>

    <div id="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function handleLogout() {
            localStorage.removeItem('jwt_token');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
