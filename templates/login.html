<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow border-0" style="width: 400px; border-radius: 12px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-success">BioSync Pro</h3>
                <p class="text-muted">Sign in to the dashboard</p>
            </div>
            
            <div id="error-message" class="alert alert-danger d-none text-center small py-2"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">Secure Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('jwt_token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = "Invalid username or password.";
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.textContent = "Server connection failed.";
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
